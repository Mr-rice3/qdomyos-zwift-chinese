name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DISPLAY: ':99'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Setup Xvfb (virtual display)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xvfb
          Xvfb -ac ${{ env.DISPLAY }} -screen 0 1280x780x24 &

      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools qtquickcontrols2-5-dev \
            libqt5bluetooth5 libqt5widgets5 libqt5positioning5 libqt5xml5 \
            qtconnectivity5-dev qtpositioning5-dev libqt5charts5-dev libqt5charts5 \
            libqt5networkauth5-dev libqt5websockets5* \
            libxcb-randr0-dev libxcb-xtest0-dev libxcb-xinerama0-dev libxcb-shape0-dev libxcb-xkb-dev

      - name: Install Qt 5.15.0 for Android
        uses: jdpurcell/install-qt-action@v5
        with:
          version: '5.15.0'
          host: 'linux'
          target: 'android'
          arch: 'android'
          modules: 'qtcharts qtnetworkauth'
          dir: '${{ github.workspace }}/output/android/'
          cache: 'true'
          cache-key-prefix: 'install-qt-action-android'

      - name: Install Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Patch Qt for correct Bluetooth behavior
        run: |
          cp qt-patches/android/5.15.0/jar/*.* ${{ github.workspace }}/output/android/Qt/5.15.0/android/jar/

      - name: Download qthttpserver 3rd party headers
        run: |
          cp qHttpServerBin/5.15.2/headers/* src/qthttpserver/src/3rdparty/http-parser/

      - name: Cache Android NDK 21
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/21.4.7075529
          key: android-ndk-21.4.7075529-${{ runner.os }}

      - name: Install NDK 21 (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER "ndk;21.4.7075529"

      - name: Setup ccache and NDK environment
        run: |
          sudo apt-get install -y ccache
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          ccache --set-config=max_size=2G
          ccache --zero-stats

          NDK_PATH=/usr/local/lib/android/sdk/ndk/21.4.7075529
          NDK_BIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin

          # Force use of NDK 21, remove newer NDKs if present
          ln -sfn $NDK_PATH /usr/local/lib/android/sdk/ndk-bundle
          rm -rf /usr/local/lib/android/sdk/ndk/25.*  2>/dev/null || true

          echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk-bundle" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk-bundle" >> $GITHUB_ENV

          # Wrap compilers with ccache
          if [ ! -f "$NDK_BIN/clang.real" ]; then
            mv $NDK_BIN/clang $NDK_BIN/clang.real
            mv $NDK_BIN/clang++ $NDK_BIN/clang++.real
          fi
          printf '#!/bin/bash\nexec /usr/bin/ccache %s/clang.real "$@"\n' "$NDK_BIN" > $NDK_BIN/clang
          printf '#!/bin/bash\nexec /usr/bin/ccache %s/clang++.real "$@"\n' "$NDK_BIN" > $NDK_BIN/clang++
          chmod +x $NDK_BIN/clang $NDK_BIN/clang++

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-android-${{ hashFiles('src/**/*.cpp', 'src/**/*.h', 'src/*.pro') }}
          restore-keys: |
            ccache-android-

      - name: Generate secrets.h (API keys, etc.)
        env:
          STRAVA_SECRET_KEY: ${{ secrets.STRAVA_SECRET_KEY }}
          PELOTON_SECRET_KEY: ${{ secrets.PELOTON_SECRET_KEY }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          INTERVALSICU_CLIENT_ID: ${{ secrets.INTERVALSICU_CLIENT_ID }}
          INTERVALSICU_CLIENT_SECRET: ${{ secrets.INTERVALSICU_CLIENT_SECRET }}
          CESIUM_KEY: ${{ secrets.CESIUMKEY }}
        run: |
          cd src
          echo "#define STRAVA_SECRET_KEY $STRAVA_SECRET_KEY" > secret.h
          echo "#define PELOTON_SECRET_KEY $PELOTON_SECRET_KEY" >> secret.h
          echo "#define SMTP_USERNAME $SMTP_USERNAME" >> secret.h
          echo "#define SMTP_PASSWORD $SMTP_PASSWORD" >> secret.h
          echo "#define SMTP_SERVER $SMTP_SERVER" >> secret.h
          echo "#define INTERVALSICU_CLIENT_ID $INTERVALSICU_CLIENT_ID" >> secret.h
          echo "#define INTERVALSICU_CLIENT_SECRET $INTERVALSICU_CLIENT_SECRET" >> secret.h
          echo "$CESIUM_KEY" >> inner_templates/googlemaps/cesium-key.js
          echo "#define LICENSE" >> secret.h
          cd ..

      - name: Compile translations (TS → QM)
        run: |
          lrelease qdomyos-zwift.pro

      - name: Build qthttpserver
        run: |
          cd src/qthttpserver
          qmake
          make -j$(nproc)
          make install
          cd ../..

      - name: Build QZ for Android (4 ABIs)
        env:
          OPENSSL_LIBS: "${{ github.workspace }}/android_openssl/no-asm/latest/arm/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/arm/libssl_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/arm64/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/arm64/libssl_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86/libssl_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86_64/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86_64/libssl_1_1.so"
        run: |
          qmake -spec android-clang \
            'ANDROID_ABIS=armeabi-v7a arm64-v8a x86 x86_64' \
            'ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/21.4.7075529'
          make -j$(nproc)
          make INSTALL_ROOT=${{ github.workspace }}/output/android/ install

          # Inject OpenSSL libraries into Android deployment settings
          sed -i '1s|{|{\n   "android-extra-libs": "${{ env.OPENSSL_LIBS }}",|' src/android-qdomyos-zwift-deployment-settings.json
          cat src/android-qdomyos-zwift-deployment-settings.json

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ runner.os }}-v1
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: Package APK
        run: |
          cd src
          androiddeployqt \
            --input android-qdomyos-zwift-deployment-settings.json \
            --output ${{ github.workspace }}/output/android/ \
            --android-platform android-31 \
            --gradle
          echo "APK built successfully"

      - name: Show ccache statistics
        if: always()
        run: ccache --show-stats

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdomyos-zwift-android-debug
          path: ${{ github.workspace }}/output/android/build/outputs/apk/debug/android-debug.apk
