name: 汉化版Android构建

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'false'

      - name: 检出子模块
        run: |
          git submodule init
          git submodule update --init --recursive

      - name: 安装系统依赖
        run: sudo apt update -y && sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools qtquickcontrols2-5-dev libqt5bluetooth5 libqt5widgets5 libqt5positioning5 libqt5xml5 qtconnectivity5-dev qtpositioning5-dev libqt5charts5-dev libqt5charts5 libqt5networkauth5-dev libqt5websockets5* libxcb-randr0-dev libxcb-xtest0-dev libxcb-xinerama0-dev libxcb-shape0-dev libxcb-xkb-dev

      - name: 安装 Qt for Android
        uses: jdpurcell/install-qt-action@v5
        with:
          version: '5.15.0'
          host: 'linux'
          target: 'android'
          arch: 'android'
          modules: 'qtcharts qtnetworkauth'
          dir: '${{ github.workspace }}/output/android/'
          cache: 'false'

      - name: 安装 Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11.0.23+9'

      - name: 修补 Qt 蓝牙
        run: cp qt-patches/android/5.15.0/jar/*.* ${{ github.workspace }}/output/android/Qt/5.15.0/android/jar/

      - name: 准备 qthttpserver 第三方头文件
        run: cp qHttpServerBin/5.15.2/headers/* src/qthttpserver/src/3rdparty/http-parser/

      - name: 缓存 NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/21.4.7075529
          key: android-ndk-21.4.7075529-${{ runner.os }}

      - name: 安装 NDK 21
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDKMANAGER "ndk;21.4.7075529"

      - name: 安装 ccache
        run: |
          sudo apt-get install -y ccache
          ccache --set-config=max_size=2G
          ccache --zero-stats

      - name: 包装 NDK 编译器 (ccache)
        run: |
          NDK_PATH=/usr/local/lib/android/sdk/ndk/21.4.7075529
          NDK_BIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          ln -sfn $NDK_PATH /usr/local/lib/android/sdk/ndk-bundle
          rm -rf /usr/local/lib/android/sdk/ndk/25.1.8937393
          if [ ! -f "$NDK_BIN/clang.real" ]; then
            mv $NDK_BIN/clang $NDK_BIN/clang.real
            mv $NDK_BIN/clang++ $NDK_BIN/clang++.real
          fi
          printf '#!/bin/bash\nexec /usr/bin/ccache %s/clang.real "$@"\n' "$NDK_BIN" > $NDK_BIN/clang
          printf '#!/bin/bash\nexec /usr/bin/ccache %s/clang++.real "$@"\n' "$NDK_BIN" > $NDK_BIN/clang++
          chmod +x $NDK_BIN/clang $NDK_BIN/clang++

      - name: 生成配置文件
        run: |
          cd src
          echo "#define STRAVA_SECRET_KEY ''" > secret.h
          echo "#define PELOTON_SECRET_KEY ''" >> secret.h
          echo "#define SMTP_USERNAME ''" >> secret.h
          echo "#define SMTP_PASSWORD ''" >> secret.h
          echo "#define SMTP_SERVER ''" >> secret.h
          echo "#define INTERVALSICU_CLIENT_ID ''" >> secret.h
          echo "#define INTERVALSICU_CLIENT_SECRET ''" >> secret.h
          echo "// Cesium key omitted" >> inner_templates/googlemaps/cesium-key.js
          cd ..

      - name: 编译 qthttpserver
        run: |
          cd src/qthttpserver
          qmake
          make -j8
          make install
          cd ../..

      - name: 生成翻译文件
        run: lrelease qdomyos-zwift.pro

      - name: 编译 QZ (4种架构)
        run: |
          qmake -spec android-clang \
            'ANDROID_ABIS=armeabi-v7a arm64-v8a x86 x86_64' \
            'ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/21.4.7075529' && \
            make -j4 && make INSTALL_ROOT=${{ github.workspace }}/output/android/ install

      - name: 配置 deployment settings 并注入 openssl
        run: |
          sed -i '1s|{|{\n   "android-extra-libs": "${{ github.workspace }}/android_openssl/no-asm/latest/arm/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/arm/libssl_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/arm64/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/arm64/libssl_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86/libssl_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86_64/libcrypto_1_1.so,${{ github.workspace }}/android_openssl/no-asm/latest/x86_64/libssl_1_1.so",|' src/android-qdomyos-zwift-deployment-settings.json

      - name: 打包 APK
        run: cd src; androiddeployqt \
          --input android-qdomyos-zwift-deployment-settings.json \
          --output ${{ github.workspace }}/output/android/ \
          --android-platform android-31 \
          --gradle \
          --aab

      - name: 上传汉化版 APK
        uses: actions/upload-artifact@v4
        with:
          name: 汉化版-qdomyos-zwift
          path: ${{ github.workspace }}/output/android/build/outputs/apk/debug/android-debug.apk
